{% macro render_channels(channels) %}
<div class="table-container">
    <table class="table is-fullwidth is-hoverable is-vcentered">
        <thead>
            <tr>
                <th>Zdroj</th>
                <th>Odkaz</th>
                <th class="has-text-centered">Stav</th>
            </tr>
        </thead>
        <tbody>
            {% for channel in channels %}
            <tr>
                <td>
                    <div class="is-flex is-align-items-center">
                        <figure class="image mr-2 is-flex is-justify-content-center is-align-items-center" style="width: 60px; height: 60px;">
                            <span class="icon is-medium mr-2 has-text-primary" id="fallback-icon-{{ channel.uuid }}" style="display: none;">
                                <i class="fas fa-rss-square fa-2x"></i>
                            </span>

                            <img src="{{ channel.logo_url }}"
                                 alt="Logo"
                                 class="channel-logo"
                                 style="width: 100%; height: 100%; object-fit: contain;">
                        </figure>
                        <div>
                            <div class="has-text-weight-bold">{{ channel.title }}</div>
                            {% if channel.feed_url %}
                                <div class="is-size-7 has-text-grey">{{ channel.feed_url }}</div>
                            {% endif %}
                        </div>
                    </div>
                </td>

                <td>
                    <a href="{{ channel.link }}" target="_blank" class="is-size-7">
                        {{ channel.link | replace('https://', '') | replace('http://', '') | truncate(30) }}
                    </a>
                </td>

                <td class="has-text-centered">
                    <label class="channel-toggle">
                        <input type="checkbox" name="disabled" value="{{ channel.uuid }}"
                               class="hidden-checkbox" {% if channel.disabled_by_user %}checked{% endif %}
                               onchange="syncToggle(this, '{{ channel.uuid }}')">
                        <div id="btn-{{ channel.uuid }}"
                             class="button is-small {{ 'is-dark is-outlined' if channel.disabled_by_user else 'is-primary' }}">
                            <span class="icon is-small"><i class="fas {{ 'fa-eye-slash' if channel.disabled_by_user else 'fa-eye' }}"></i></span>
                            <span>{{ 'Vypnuto' if channel.disabled_by_user else 'Aktivní' }}</span>
                        </div>
                    </label>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endmacro %}
